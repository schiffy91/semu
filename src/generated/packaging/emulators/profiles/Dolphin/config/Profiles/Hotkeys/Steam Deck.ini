[Profile]
Device = XInput2/0/Virtual core pointer
General/Open = @(Ctrl+O)
General/Toggle Pause = @(Ctrl+P)
General/Stop = @(Ctrl+Q)
General/Toggle Fullscreen = @(Ctrl+Enter)
General/Take Screenshot = @(Ctrl+X)
