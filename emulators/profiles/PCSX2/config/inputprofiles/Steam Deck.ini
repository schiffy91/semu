[Pad]
UseProfileHotkeyBindings = true
MultitapPort1 = false
MultitapPort2 = false

[InputSources]
Keyboard = true
Mouse = true
SDL = true
DInput = false
XInput = false

[Pad1]
Type = DualShock2
Up = SDL-1/DPadUp
Right = SDL-1/DPadRight
Down = SDL-1/DPadDown
Left = SDL-1/DPadLeft
Triangle = SDL-1/Y
Circle = SDL-1/B
Cross = SDL-1/A
Square = SDL-1/X
Select = SDL-1/Back
Start = SDL-1/Start
L1 = SDL-1/LeftShoulder
L2 = SDL-1/+LeftTrigger
R1 = SDL-1/RightShoulder
R2 = SDL-1/+RightTrigger
L3 = SDL-1/LeftStick
R3 = SDL-1/RightStick
LUp = SDL-1/-LeftY
LRight = SDL-1/+LeftX
LDown = SDL-1/+LeftY
LLeft = SDL-1/-LeftX
RUp = SDL-1/-RightY
RRight = SDL-1/+RightX
RDown = SDL-1/+RightY
RLeft = SDL-1/-RightX

[Pad2]
Type = None

[Hotkeys]
OpenPauseMenu = Keyboard/Control & Keyboard/M
TogglePause = Keyboard/Control & Keyboard/P
ToggleFullscreen = Keyboard/Control & Keyboard/Enter
PreviousSaveStateSlot = Keyboard/Control & Keyboard/J
NextSaveStateSlot = Keyboard/Control & Keyboard/K
SaveStateToSlot = Keyboard/Control & Keyboard/S
LoadStateFromSlot = Keyboard/Control & Keyboard/A
Screenshot = Keyboard/Control & Keyboard/X
ToggleTurbo = Keyboard/Control & Keyboard/Plus
ToggleSlowMotion = Keyboard/Control & Keyboard/Minus
