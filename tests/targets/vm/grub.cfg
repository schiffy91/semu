set timeout=1
set default="0"
set menu_auto_hide=false

function load_video {
  insmod all_video
}

load_video
set gfxpayload=keep
insmod gzio
insmod part_gpt
insmod chain

search --no-floppy --set=root -l 'Bazzite-Live'

menuentry 'Install Bazzite Deck E2E' {
  linux /images/pxeboot/vmlinuz quiet console=tty0 console=ttyS0,115200n8 root=live:CDLABEL=Bazzite-Live enforcing=0 rd.live.image nomodeset systemd.run=/run/initramfs/live/semu_install systemd.run_success_action=none systemd.run_failure_action=poweroff
  initrd /images/pxeboot/initrd.img
}
