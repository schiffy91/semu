name: Smoke Tests
on: [push, pull_request]

jobs:
  # Container test — same Dockerfile used locally via `make container-test`
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t semu-test .
      - run: docker run --rm -v "$PWD:/semu" semu-test make test

  # Native tests on each platform
  native:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: make test
