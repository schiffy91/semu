name: Smoke Tests
on: [push, pull_request]

jobs:
  # Container test — same Dockerfile used locally via `make container-test`
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t schemulator-test .
      - run: docker run --rm -v "$PWD:/schemulator:ro" schemulator-test python -m pytest test/ -v

  # Native tests on each platform
  native:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pycryptodome pytest
      - run: python -m pytest test/ -v
