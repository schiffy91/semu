[UI]
SettingsVersion = 1
InhibitScreensaver = true
ConfirmShutdown = false
StartPaused = false
PauseOnFocusLoss = false
StartFullscreen = true
DoubleClickTogglesFullscreen = true
HideMouseCursor = true
RenderToSeparateWindow = false
HideMainWindowWhenRunning = true
DisableWindowResize = false
Theme = darkfusionblue
SetupWizardIncomplete = false

[Folders]
Bios = ${ps2_bios}
Snapshots = ${generated}/emulators/pcsx2/xdg/data/PCSX2/snaps
Savestates = ${generated}/emulators/pcsx2/xdg/data/PCSX2/sstates
MemoryCards = ${generated}/emulators/pcsx2/xdg/data/PCSX2/memcards
Logs = ${generated}/emulators/pcsx2/xdg/data/PCSX2/logs
Cheats = ${generated}/emulators/pcsx2/xdg/data/PCSX2/cheats
Patches = ${generated}/emulators/pcsx2/xdg/data/PCSX2/patches
Cache = ${generated}/emulators/pcsx2/xdg/data/PCSX2/cache
Textures = ${generated}/emulators/pcsx2/xdg/data/PCSX2/textures
InputProfiles = ${generated}/emulators/pcsx2/xdg/config/PCSX2/inputprofiles

[EmuCore]
EnablePatches = true
EnableCheats = false
EnableFastBoot = true
EnableRecordingTools = false
SaveStateOnShutdown = false
UseSavestateSelector = true
InhibitScreensaver = true
BackupSavestate = true
McdFolderAutoManage = true
WarnAboutUnsafeSettings = false

[EmuCore/GS]
VsyncEnable = false
AspectRatio = Auto 4:3/3:2
FMVAspectRatioSwitch = Off
pcrtc_antiblur = true
IntegerScaling = false
OsdShowSpeed = false
OsdShowFPS = false
OsdShowVPS = false
OsdShowCPU = false
OsdShowGPU = false
OsdShowResolution = false
OsdShowIndicators = false
Renderer = -1
upscale_multiplier = 1
filter = 2
texture_preloading = 2
TVShader = 1
linear_present_mode = 1
deinterlace_mode = 0

[InputSources]
Keyboard = true
SDL = true
XInput = false
DInput = false

[Hotkeys]
OpenPauseMenu = Keyboard/Escape
ToggleFullscreen = Keyboard/Alt & Keyboard/Return
Screenshot = Keyboard/F8
LoadStateFromSlot = Keyboard/F3
SaveStateToSlot = Keyboard/F1
NextSaveStateSlot = Keyboard/F2
PreviousSaveStateSlot = Keyboard/Shift & Keyboard/F2
