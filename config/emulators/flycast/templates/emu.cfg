[config]
Dreamcast.ContentPath = ${roms}/dreamcast
Dreamcast.HideLegacyNaomiRoms = yes
Dreamcast.Region = 1
Dreamcast.Language = 1

[window]
fullscreen = yes
maximized = yes
width = 1280
height = 800

[rend]
RendererType = 0
Widescreen = no
WideScreenGameHacks = no
SuperWidescreen = no
Rotate90 = no
ShowFPS = no
TextureUpscale = 1
MaxFilteredTextureSize = 256

[input]
VirtualGamepadVibration = yes
